name: Telegram Forwarder

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

concurrency:
  group: telegram-forwarder
  cancel-in-progress: false

jobs:
  forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run forwarder
        env:
          TG_API_ID: ${{ secrets.TG_API_ID }}
          TG_API_HASH: ${{ secrets.TG_API_HASH }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
          SOURCE_CHAT_ID: ${{ secrets.SOURCE_CHAT_ID }}
          DEST_CHAT_ID: ${{ secrets.DEST_CHAT_ID }}
        run: python forwarder.py

      - name: Persist state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update forwarder state [skip ci]"
          git push
